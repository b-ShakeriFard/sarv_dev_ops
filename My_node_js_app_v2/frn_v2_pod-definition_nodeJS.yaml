apiVersion: v1
kind: Pod
metadata:
  name: frn-app-nodejs-pod-v2
  labels:
    app: frn-node-app-v2
spec:
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
    - name: node-container
      image: localhost:5000/frn-app-nodejs-2025-07-09-a:v2
      ports: 
        - containerPort: 3001
      env:
        - name: REDIS_URL
          value: "redis://redis-service:6379"
          
