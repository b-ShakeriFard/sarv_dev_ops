apiVersion: v1
kind: Pod
metadata:
  name: frn-flask-pod-v1
  labels:
    app: frn-flask-app-v1
spec:
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
    - name: flask-container
      image: localhost:5000/frn-flask-v1-tejaris-2025-07-07:v1
      ports: 
        - containerPort: 5000
      env:
        - name: REDIS_HOST
          value: "redis-service"
          
